            margin-bottom: 30px;
            color: #666;
        }
        .question-card {
            background: #fff;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border: 1px solid #eaeaea;
        }
        .question-title {
            margin-top: 0;
            color: #2c3e50;
            font-size: 1.1em;
        }
        .multi-notice {
            display: inline-block;
            background: #e74c3c;
            color: white;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.85em;
            font-weight: bold;
            margin-bottom: 15px;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 15px;
        }
        .option-label {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            background: #fdfdfd;
            border: 1px solid #ddd;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
            word-break: break-all;
        }
        .option-label:hover {
            background: #f1f1f1;
        }
        .option-label input {
            margin-right: 10px;
            transform: scale(1.2);
        }
        .result-icon {
            font-weight: bold;
            margin-left: auto;
            padding-left: 10px;
            white-space: nowrap;
        }
        .correct { color: #27ae60; }
        .incorrect { color: #c0392b; }
        .correct-bg { background-color: #e8f8f5 !important; border-color: #27ae60; }
        .wrong-bg { background-color: #fdedec !important; border-color: #e74c3c; }
        .missed-bg { background-color: #fef9e7 !important; border-color: #f1c40f; }

        .check-btn {
            display: block;
            width: 100%;
            padding: 12px;
            font-size: 1.1em;
            font-weight: bold;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .check-btn:hover {
            background: #2980b9;
        }
        .check-btn:disabled {
            background: #bdc3c7;
            cursor: not-allowed;
        }
    </style>

        // 配列をシャッフルする関数
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        // アプリの描画
        function renderQuiz() {
            const container = document.getElementById('quiz-container');
            
            quizData.forEach((q, index) => {
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = `q-card-${index}`;

                let html = `<h3 class="question-title">問${index + 1}. ${q.question}</h3>`;
                
                if (q.type === 'multi') {
                    html += `<div class="multi-notice">【複数選択】</div>`;
                }

                html += `<div class="options">`;
                
                // 選択肢をシャッフル
                const shuffledOptions = shuffleArray([...q.options]);

                shuffledOptions.forEach((opt, optIndex) => {
                    const inputType = q.type === 'multi' ? 'checkbox' : 'radio';
                    const name = q.type === 'multi' ? `q${index}_${optIndex}` : `q${index}`;
                    const id = `q${index}_opt${optIndex}`;
                    
                    html += `
                        <label class="option-label" for="${id}">
                            <input type="${inputType}" name="${name}" id="${id}" value="${opt.isCorrect}">
                            ${opt.text}
                            <span class="result-icon" id="result-${id}"></span>
                        </label>
                    `;
                });

                html += `</div>`;
                
                // 問題ごとの回答ボタンを追加
                html += `<button class="check-btn" onclick="checkSingleAnswer(${index})" id="btn-${index}">回答する</button>`;
                
                card.innerHTML = html;
                container.appendChild(card);
            });
        }

        // 1問ごとの回答判定
        function checkSingleAnswer(index) {

            const inputs = card.querySelectorAll('input');
            const btn = document.getElementById(`btn-${index}`);

            const hasSelection = Array.from(inputs).some(input => input.checked);

                alert("選択肢を選んでください。");
                return;
            }

                const isCorrectOption = input.value === 'true';

                        if (isChecked) {
                            resultIcon.innerHTML = '⭕️';
                            resultIcon.className = 'result-icon correct';
                            label.classList.add('correct-bg');
                        } else {
                            resultIcon.innerHTML = '❌ 選択漏れ';
                            resultIcon.className = 'result-icon incorrect';
                            label.classList.add('missed-bg');
                        }
                    } else {
                        if (isChecked) {
                            resultIcon.innerHTML = '❌ 不正解';
                            resultIcon.className = 'result-icon incorrect';
                            label.classList.add('wrong-bg');
                        }
                    }
                } else {
                    // 単一選択の場合
                    if (isCorrectOption) {
                        label.classList.add('correct-bg');
                        if (isChecked) {
                            resultIcon.innerHTML = '⭕️ 正解';
                            resultIcon.className = 'result-icon correct';
                        } else {
                            resultIcon.innerHTML = '👈 正解';
                            resultIcon.className = 'result-icon correct';
                        }
                    } else {
                        if (isChecked) {
                            resultIcon.innerHTML = '❌ 不正解';
                            resultIcon.className = 'result-icon incorrect';
                            label.classList.add('wrong-bg');
                        }
                    }
                }
                // 入力を無効化（変更不可にする）
                input.disabled = true;
            });
            
            // ボタンの表示を変更して無効化する
            btn.innerText = "回答済み";
            btn.disabled = true;
        }

        // 初期描画
        window.onload = renderQuiz;
    </script>
</body>
</html>
